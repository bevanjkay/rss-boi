services:
  postgres:
    env_file:
      - .env
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-rssboi}
      POSTGRES_USER: ${POSTGRES_USER:-rssboi}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    image: ghcr.io/bevanjkay/rss-boi:api
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${API_PORT:-3001}:3001"

  worker:
    image: ghcr.io/bevanjkay/rss-boi:worker
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy

  web:
    image: ghcr.io/bevanjkay/rss-boi:web
    env_file:
      - .env
    depends_on:
      - api
    ports:
      - "${WEB_PORT:-3000}:3000"

volumes:
  postgres_data:
