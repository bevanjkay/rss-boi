services:
  postgres:
    env_file:
      - ../../.env
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-rssboi}
      POSTGRES_USER: ${POSTGRES_USER:-rssboi}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ../..
      dockerfile: apps/api/Dockerfile
    env_file:
      - ../../.env
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${API_PORT:-3001}:3001"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/health/live || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 30s

  worker:
    build:
      context: ../..
      dockerfile: apps/worker/Dockerfile
    env_file:
      - ../../.env
    depends_on:
      api:
        condition: service_healthy

  web:
    build:
      context: ../..
      dockerfile: apps/web/Dockerfile
    env_file:
      - ../../.env
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "${WEB_PORT:-3000}:3000"

volumes:
  postgres_data:
